{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1><i class="fas fa-key"></i> Reset Password</h1>
    <p>Reset password for any user account</p>
</div>
<div class="card" style="max-width:560px;">
    <div class="card-title"><i class="fas fa-lock"></i> Change User Password</div>
    <form action="/reset_password" method="POST">
        <div class="form-group mb-2">
            <label>Select User *</label>
            <select name="uid" required>
                <option value="">-- Select User --</option>
                {% for u in users %}
                <option value="{{ u.id }}">[{{ u.role|upper }}] {{ u.name }} ({{ u.username }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group mb-2">
            <label>New Password *</label>
            <input type="password" name="new_password" placeholder="Min. 4 characters" required minlength="4">
        </div>
        <button type="submit" class="btn btn-warning">
            <i class="fas fa-key"></i> Reset Password
        </button>
    </form>
    <div class="alert alert-info-box mt-2">
        <i class="fas fa-info-circle"></i>
        <div>Password will be hashed and saved securely. The user must use the new password on next login.</div>
    </div>
</div>
{% endblock %}
